<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sumatra Q - Visor CAD Multi-Pieza</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>
<body>
 <div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; display:flex; justify-content:center; align-items:center;">
  <div style="background:white; padding:30px; border-radius:12px; text-align:center; max-width:320px; width:90%; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
    <img src="./img/SumatraQ_logo.jpg" alt="Sumatra Q" style="width: 120px; height: 120px; object-fit: contain; margin: 0 auto 15px auto; display: block;">
    <p style="font-size:13px; color:#666; margin-bottom:20px;">Identifícate con tus credenciales de sistema.</p>
    
    <input type="email" id="loginEmail" placeholder="Tu Email" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; font-size:14px;">
    <input type="password" id="loginPassword" placeholder="Tu Contraseña" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; font-size:14px;">
    
    <button id="loginBtn" onclick="processLogin()" style="width:100%; padding:14px; background:#4285F4; color:white; border:none; border-radius:6px; font-weight:bold; font-size:15px; cursor:pointer; transition:0.3s;">Conectando a BD...</button>
  </div>
</div>

  <div id="map-container"></div>

  <div class="ui-layer">
    <div class="search-box interactive-element">
      <button class="menu-btn" onclick="togglePanel()" title="Menú">☰</button>
      <div class="search-title" id="fileNameDisplay">Añade STLs (soporta múltiples)...</div>
      <label for="fileInput" class="file-label" title="Cargar Archivo">🔩</label>
      <input type="file" id="fileInput" accept=".stl,.STL" multiple />
    </div>

    <div class="layers-control interactive-element">
      <button class="layer-btn active" data-mode="shaded">Sombreado</button>
      <button class="layer-btn" data-mode="shadedEdges">Aristas</button>
      <button class="layer-btn" data-mode="wireframe">Alambre</button>
    </div>

    <div class="side-panel interactive-element" id="functionalityPanel">
      <div class="panel-header" style="display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <img src="./img/SumatraQ_logo.jpg" alt="Sumatra Q" style="height: 26px; width: 26px; object-fit: contain; border-radius: 4px;">
          <span>Inspección 3D</span>
        </div>
        <button class="menu-btn" style="width: 32px; height: 32px; margin: 0;" onclick="togglePanel()">✕</button>
      </div>
      <div class="panel-content">
        <div class="user-profile-card">
          <div style="display: flex; align-items: center; gap: 10px;">
            <div class="user-avatar" id="userAvatarLetter">U</div>
            <div>
              <div style="font-size: 11px; color: var(--text-secondary);">Sesión activa como:</div>
              <div id="currentUserDisplay" style="font-size: 13px; font-weight: 500; color: var(--text-primary);">---</div>
            </div>
          </div>
         <button onclick="window.processLogout()" class="logout-btn" title="Cerrar sesión">
  🚪 Salir
</button> 
        </div>

        <h3 style="margin: 0 0 8px 0; font-size: 14px; color: var(--text-secondary);">MIS PIEZAS</h3>
        <div id="fileListUI" class="files-container"></div>

        <div id="form" class="form-container">
          <h3 id="formMainTitle" style="margin: 0 0 4px 0; font-size: 15px; color: var(--primary-blue);">Nueva Incidencia</h3>
          <p id="issueTargetFile" style="font-size: 11px; color: var(--text-secondary);"></p>
          
          <div id="historyContainer" class="history-container">
            <h4 style="margin: 0 0 8px 0; font-size: 11px; color: var(--text-secondary);">HISTORIAL DE CAMBIOS</h4>
            <div id="historyTimeline" class="history-timeline"></div>
          </div>

          <label>Tipo:</label>
          <select id="issueType" style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px; border:1px solid #ccc;">
            <option value="">Cargando tipos de incidencia...</option>
          </select>

          <div id="updateDivider" style="display:none; margin: 16px 0 8px 0; border-top: 1px dashed var(--border-color); padding-top: 8px;">
            <h4 style="margin: 0; font-size: 12px; color: var(--primary-blue);">Añadir actualización:</h4>
          </div>

          <label>Comentario:</label>
          <input type="text" id="issueComment" placeholder="Descripción o avance..." />
          
          <label>Fotos:</label>
          <div style="display:flex; gap:8px; margin-bottom:8px;">
            <button class="btn-primary btn-inline" id="btnGallery">🖼️ Galería</button>
            <button class="btn-primary btn-inline" id="btnCamera">📷 Cámara</button>
          </div>
          <input type="file" id="inputGallery" accept="image/*" style="display:none" />
          <input type="file" id="inputCamera" accept="image/*" capture="environment" style="display:none" />
          <div id="photoGrid" class="photo-grid"></div>

          <label>Estado actual:</label>
          <select id="issueStatus">
            <option value="open">Abierto (Rojo)</option>
            <option value="review">En revisión (Amarillo)</option>
            <option value="closed">Cerrado (Verde)</option>
          </select>
          <button class="btn-primary" id="saveIssue">Guardar</button>
        </div>

        <div style="display:flex; gap:8px; margin-bottom:12px;">
          <button class="btn-primary btn-inline" id="exportGlobalBtn">Exportar Sesión</button>
          <button class="btn-primary btn-inline" id="importBtn">Importar JSON</button>
          <button class="btn-primary" onclick="exportToCSV()" style="background-color: #1e8e3e; margin-top: 10px;">📊 Exportar a EXCEL (CSV)</button>
          <button class="btn-primary" onclick="window.generatePDF()" style="background-color: #d93025; margin-top: 10px;">📄 Generar PDF</button>
          <input type="file" id="importInput" accept="application/json" style="display:none" />
        </div>

        <h3 style="margin: 0 0 12px 0; font-size: 14px; color: var(--text-secondary);">LISTA DE INCIDENCIAS</h3>
        
        <div class="filters-wrapper" style="margin-bottom: 15px;">
          <div style="font-size: 11px; color: #666; margin-bottom: 8px; font-weight: bold;">FILTRAR POR ESTADO:</div>
          <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button class="filter-btn active" onclick="window.setFilter('all')" data-filter="all">Todos</button>
            <button class="filter-btn" onclick="window.setFilter('open')" data-filter="open" style="border-bottom: 3px solid #e94335;">Abiertos</button>
            <button class="filter-btn" onclick="window.setFilter('review')" data-filter="review" style="border-bottom: 3px solid #fbbc04;">Revisión</button>
            <button class="filter-btn" onclick="window.setFilter('closed')" data-filter="closed" style="border-bottom: 3px solid #34a853;">Cerrados</button>
          </div>
        </div>
        <div id="list"></div>
      </div>
    </div>

    <div class="fab-container interactive-element">
      <div class="fab-group">
        <button class="fab" id="moveIssueBtn" title="Mover">🎯</button>
        <button class="fab" id="deleteIssueBtn" title="Borrar">🗑️</button>
        <button class="fab" data-view="fit" title="Centrar">🔲</button>
        <button class="fab" data-view="iso" title="Iso">🧊</button>
      </div>
      <button class="fab primary" id="addBtn" title="Añadir">➕</button>
    </div>
  </div>
 
<div id="lightbox" class="lightbox interactive-element">
    <div class="lightbox-close" id="lightboxClose">&times;</div>
    <img id="lightboxImg" class="lightbox-img" src="" alt="Ampliación" />
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
<div id="splashScreen" class="splash-screen">
    <img src="./img/SumatraQ_logo.jpg" alt="Sumatra Q Logo" class="splash-logo">
    <div class="splash-spinner"></div>
  </div>
</html>
