<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sumatra Q - Visor CAD Multi-Pieza</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    <link rel="stylesheet" href="./css/styles.css">
  </style>
</head>
<body>
  <div id="map-container"></div>

  <div class="ui-layer">
    <div class="search-box interactive-element">
      <button class="menu-btn" onclick="togglePanel()" title="Menú">☰</button>
      <div class="search-title" id="fileNameDisplay">Añade STLs (soporta múltiples)...</div>
      <label for="fileInput" class="file-label" title="Cargar Archivo">🔩</label>
      <input type="file" id="fileInput" accept=".stl,.STL" multiple /> </div>

    <div class="layers-control interactive-element">
      <button class="layer-btn active" data-mode="shaded">Sombreado</button>
      <button class="layer-btn" data-mode="shadedEdges">Aristas</button>
      <button class="layer-btn" data-mode="wireframe">Alambre</button>
    </div>

    <div class="side-panel interactive-element" id="functionalityPanel">
      <div class="panel-header">
        Inspección
        <button class="menu-btn" style="width: 32px; height: 32px;" onclick="togglePanel()">✕</button>
      </div>
      <div class="panel-content">
        
        <h3 style="margin: 0 0 8px 0; font-size: 14px; color: var(--text-secondary);">MIS PIEZAS</h3>
        <div id="fileListUI" class="files-container">
          <p style="font-size: 13px; color: var(--text-secondary); text-align: center; margin: 10px 0;">No hay piezas en sesión.</p>
        </div>

        <div id="form" class="form-container">
          <h3 style="margin: 0 0 4px 0; font-size: 15px; color: var(--primary-blue);">Editar Incidencia</h3>
          <p id="issueTargetFile" style="font-size: 11px; color: var(--text-secondary); margin-top: 0; margin-bottom: 12px; font-weight: 500;"></p>
          
          <label>Tipo:</label>
          <select id="issueType">
            <option>rebaba</option>
            <option>rayadura</option>
            <option>fisura</option>
          </select>
          <label>Comentario:</label>
          <input type="text" id="issueComment" placeholder="Añade una descripción..." />
          
          <label>Fotos:</label>
          <div style="display:flex; gap:8px; margin-bottom:8px; flex-wrap: wrap;">
            <button class="btn-primary btn-inline" id="btnGallery" title="Añadir foto de galería">🖼️ Galería</button>
            <button class="btn-primary btn-inline" id="btnCamera" title="Tomar foto con cámara">📷 Cámara</button>
          </div>
          <input type="file" id="inputGallery" accept="image/*" style="display:none" />
          <input type="file" id="inputCamera" accept="image/*" capture="environment" style="display:none" />
          <div id="photoGrid" class="photo-grid"></div>

          <label>Estado:</label>
          <select id="issueStatus">
            <option value="open">Abierto (Rojo)</option>
            <option value="review">En revisión (Amarillo)</option>
            <option value="closed">Cerrado (Verde)</option>
          </select>
          <button class="btn-primary" id="saveIssue">Guardar</button>
        </div>

        <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap: wrap;">
          <button class="btn-primary btn-inline" id="exportGlobalBtn" title="Exportar incidencias de TODAS las piezas cargadas">Exportar Sesión</button>
          <button class="btn-primary btn-inline" id="importBtn" title="Importar incidencias desde un archivo JSON">Importar JSON</button>
          <input type="file" id="importInput" accept="application/json" style="display:none" />
        </div>

        <div>
          <h3 style="margin: 0 0 12px 0; font-size: 14px; color: var(--text-secondary);">LISTA DE INCIDENCIAS</h3>
          <div id="list">
            <p style="font-size: 13px; color: var(--text-secondary); text-align: center; margin-top: 20px;">Carga piezas y mantén pulsado en ellas para añadir incidencias.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="fab-container interactive-element">
      <div class="fab-group">
        <button class="fab" id="moveIssueBtn" title="Mover incidencia">🎯</button>
        <button class="fab" id="deleteIssueBtn" title="Borrar incidencia">🗑️</button>
        <button class="fab" data-view="fit" title="Centrar cámara">🔲</button>
        <button class="fab" data-view="iso" title="Vista Isométrica">🧊</button>
      </div>
      <button class="fab primary" id="addBtn" title="Añadir incidencia">➕</button>
    </div>
  </div>

  <div id="lightbox" class="lightbox interactive-element">
    <div class="lightbox-close" id="lightboxClose">&times;</div>
    <img id="lightboxImg" class="lightbox-img" src="" alt="Ampliación" />
  </div>

  <script type="importmap">
    {
      "imports":{
        "three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
      }
    }
  </script>
<script type="module" src="./js/app.js"></script>
  </script>
</body>
</html>
